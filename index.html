<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Employee Discipline Form</title>

  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" type="image/png" href="icon.png">

  <meta name="apple-mobile-web-app-title" content="Discipline Form">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f2f57">

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #1f2933;
    }

    .card {
      background: white;
      padding: 36px;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
      max-width: 340px;
    }

    img {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 10px;
    }

    p {
      font-size: 15px;
      margin: 0 0 22px;
      color: #52606d;
    }

    button {
      background: #0f2f57;
      color: white;
      border: none;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 12px;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background: #123d73;
    }

    .note {
      font-size: 12px;
      color: #7b8794;
      margin-top: 18px;
    }
  </style>
</head>

<body>
  <div class="card">
    <img src="icon.png" alt="Employee Discipline Form Icon">
    <h1>Employee Discipline Form</h1>
    <p>Tap the button below to open the Microsoft Form.</p>

    <button onclick="openForm()">Open Form</button>

    <p class="note">Add this page to your home screen before opening the form.</p>
  </div>

  <script>
    function openForm() {
      window.location.href = "https://forms.cloud.microsoft/Pages/ResponsePage.aspx?id=0oJwgH5NfEu1B-9keMtcqpnsWoUqr0ZGkWvqEUbsW0JUNUVOVTczOVNOSUo5SkdQWjczNllRMU9UTC4u";
    }
  </script>
</body>
</html>
